services:
  - type: web
    name: api-prodn
    env: docker
    repo: https://github.com/Emaren/api-prodn
    branch: main
    plan: free
    autoDeploy: true
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aoe2hd-db
          property: connectionString
      - key: ENV
        value: production

databases:
  - name: aoe2db
    plan: free
